<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Tracker BlazorApp</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Study Tracker BlazorApp.styles.css" rel="stylesheet" />

    <style>
        /* Global reset & base styles – all inline/embedded for a clean, responsive layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #eef2f7 0%, #d9e2ec 100%);
            padding: 1.5rem;
            color: #1e2a3e;
        }

        /* main container – like a card layout */
        .tracker-container {
            max-width: 1300px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 1.8rem 2rem 2.5rem 2rem;
            transition: all 0.2s;
        }

        /* header with South African vibe */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 3px solid #e67e22;
            padding-bottom: 1.2rem;
        }

            .header h1 {
                font-size: 2.3rem;
                background: linear-gradient(135deg, #1e466e, #e67e22);
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
                letter-spacing: -0.5px;
                display: inline-block;
            }

        .za-badge {
            background: #f39c12;
            display: inline-block;
            font-size: 0.8rem;
            font-weight: bold;
            color: #1e2a3e;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            margin-left: 12px;
            vertical-align: middle;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.05);
        }

        .sub {
            text-align: center;
            color: #2c3e66;
            margin-top: 0.5rem;
            font-weight: 500;
            font-size: 1rem;
        }

        /* stats cards – shows key metrics without JS (manual entry, but visually tracks) */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: #f8fafc;
            flex: 1;
            min-width: 150px;
            border-radius: 1.5rem;
            padding: 1.2rem 0.8rem;
            text-align: center;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
            border: 1px solid #e2edf2;
            transition: transform 0.2s;
        }

            .stat-card:hover {
                transform: translateY(-3px);
                background: #fff;
            }

        .stat-number {
            font-size: 2.4rem;
            font-weight: 800;
            color: #e67e22;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #3a546d;
            margin-top: 0.4rem;
        }

        /* main two-column layout: study plan + today's tasks */
        .dashboard-split {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .plan-panel {
            flex: 1.2;
            background: #ffffff;
            border-radius: 1.5rem;
            border: 1px solid #e9f0f5;
            padding: 1.3rem 1.5rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.03);
        }

        .task-panel {
            flex: 1.8;
            background: #ffffff;
            border-radius: 1.5rem;
            border: 1px solid #e9f0f5;
            padding: 1.3rem 1.5rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.03);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            border-left: 5px solid #e67e22;
            padding-left: 0.8rem;
            margin-bottom: 1.2rem;
            color: #1f3b4c;
        }

        /* weekly schedule table – static but fully editable / interactive via checkboxes (no js) */
        .study-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

            .study-table th, .study-table td {
                border-bottom: 1px solid #e2e8f0;
                padding: 12px 6px;
                text-align: left;
                vertical-align: middle;
            }

            .study-table th {
                background-color: #fef5e7;
                color: #b45f1b;
                font-weight: 700;
            }

        .checkbox-cell {
            text-align: center;
            width: 40px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #e67e22;
            cursor: pointer;
            transform: scale(1);
        }

        .subject-badge {
            background: #fdebd0;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-block;
            color: #c05e1a;
        }

        /* today's tasks list */
        .task-list {
            list-style: none;
            margin-top: 0.5rem;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eef2f6;
            gap: 12px;
        }

        .task-check {
            flex-shrink: 0;
        }

        .task-detail {
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            font-size: 1rem;
            color: #1f3b4c;
        }

        .task-subject {
            font-size: 0.75rem;
            color: #e67e22;
            font-weight: 500;
        }

        .task-priority {
            font-size: 0.7rem;
            background: #f1f3f5;
            padding: 2px 8px;
            border-radius: 50px;
        }

        /* study resources / motivation (South African inspired) */
        .motivation-card {
            background: linear-gradient(115deg, #fef9e6 0%, #fff6ea 100%);
            border-radius: 1.2rem;
            padding: 1.2rem 1.5rem;
            margin-top: 1.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid #e67e22;
        }

        .quote-text {
            font-style: italic;
            font-weight: 500;
            color: #2c3e50;
        }

        .flag-emojis {
            font-size: 1.6rem;
            letter-spacing: 5px;
        }

        /* manual tracker note: no JS means the checkboxes retain state on page refresh,
           but users can tick/untick manually. This is perfect for a 'no-login' template.
           We also display the total completed count as visual feedback (using HTML only? but we can show
           default counts – but that would require JS. However we use static counters as a demo of potential,
           but to respect NO JS, we simply present all checkboxes unchecked by default, and the user can see their
           progress manually. For better UX, I also added a 'Today's Progress' section that shows the number
           of checked tasks dynamically? That would require JS. Since strict NO JS, I'll avoid dynamic counters.
           But I'll provide a manual 'self-report' checkbox to encourage tracking. Also a study log textarea
           and manual input for subjects to keep full control without JS. */

        .manual-progress {
            background: #ffffffdd;
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 1rem;
            background: #fef2e8;
            text-align: center;
            font-size: 0.8rem;
            border: 1px solid #ffd7b5;
        }

        .info-note {
            font-size: 0.7rem;
            color: #7f8c8d;
            text-align: center;
            margin-top: 1rem;
        }

        /* study log / notes section - no JS needed */
        .study-notes {
            margin-top: 2rem;
        }

        textarea {
            width: 100%;
            border-radius: 1rem;
            border: 1px solid #cfdee9;
            padding: 0.8rem;
            font-family: inherit;
            background: #fefcf7;
            resize: vertical;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #2c5282;
        }

        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #5f7f9e;
            border-top: 1px solid #e2edf2;
            padding-top: 1rem;
        }

        @media (max-width: 760px) {
            .tracker-container {
                padding: 1rem;
            }

            .section-title {
                font-size: 1.3rem;
            }
        }

        button, .fake-button {
            background: none;
            border: none;
        }

        /* manual input for custom subjects - no JS, just informative */
        .custom-subject-note {
            background: #eef2fa;
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            margin-top: 1rem;
        }

        hr {
            margin: 1rem 0;
            border-color: #e2edf2;
        }

        }

        .crud-layout {

        }

        .form-panel {
            flex: 1.2;
            background: #fefaf5;
            border-radius: 1.5rem;
            padding: 1.5rem;

        }

        .list-panel {

            background: #ffffff;
            border-radius: 1.5rem;

        }

        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #2c5282;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 1rem;
            border: 1px solid #cfdee9;
            font-family: inherit;
            background: white;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 2rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-block;
            text-align: center;
            text-decoration: none;
            margin-right: 8px;
            margin-top: 8px;
        }

        .btn-primary {
            background: #e67e22;
            color: white;
            border: none;
        }

        .btn-secondary {
            background: #2c3e50;
            color: white;
        }

        .btn-danger {
            background: #c0392b;
            color: white;
        }

        .btn-warning {
            background: #f1c40f;
            color: #2c3e50;
        }

            font-size: 0.75rem;

        }

        .action-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .edit-link, .delete-link {
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
        }

        .edit-link {
            background: #f39c12;
            color: #2c3e50;
        }

        .delete-link {
            background: #e74c3c;
            color: white;
        }

        .search-box {
            margin-bottom: 1.2rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;

    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
